name: Nightly Release Build

on:
  push:
    branches:
      - dev
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch: {}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare release metadata
        id: meta
        run: |
          echo "RELEASE_TAG=nightly" >> $GITHUB_ENV
          echo "RELEASE_NAME=Nightly build" >> $GITHUB_ENV

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_TAG }}-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create or get draft GitHub release
        id: create_release
        uses: actions/github-script@v6
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const name = process.env.RELEASE_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setOutput('upload_url', existing.data.upload_url);
              core.setOutput('release_id', existing.data.id.toString());
            } catch (err) {
              const created = await github.rest.repos.createRelease({ owner, repo, tag_name: tag, name, draft: true, prerelease: true });
              core.setOutput('upload_url', created.data.upload_url);
              core.setOutput('release_id', created.data.id.toString());
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs to release
        if: steps.create_release.outputs.upload_url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -e
          for file in build/app/outputs/flutter-apk/*.apk; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            echo "Uploading $filename to release"
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"$file" "$UPLOAD_URL?name=$filename"
          done
