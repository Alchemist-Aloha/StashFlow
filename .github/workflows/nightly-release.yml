name: Nightly Release Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      archive_suffix: -nightly
      pages_commit_message: "Deploy Nightly to GitHub Pages: ${{ github.sha }}"
      rolling_tag: nightly
      release_name: Nightly Build
      release_body: "Latest development build from the dev branch. Commit: ${{ github.sha }}"
      prerelease: true
      make_latest: true
    secrets: inherit
