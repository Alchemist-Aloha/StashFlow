name: Release Candidate Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      archive_suffix: -rc
      pages_commit_message: "Deploy Release Candidate to GitHub Pages: ${{ github.sha }}"
      rolling_tag: release-candidate
      release_name: Release Candidate
      release_body: "Latest release candidate build from the main branch. Commit: ${{ github.sha }}"
      prerelease: true
      make_latest: false
    secrets: inherit
