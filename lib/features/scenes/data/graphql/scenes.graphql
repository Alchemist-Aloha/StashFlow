fragment SlimSceneData on Scene {
  id
  title
  date
  rating100
  o_counter
  organized
  interactive
  resume_time
  play_count
  play_duration
  files {
    path
    duration
    width
    height
    fingerprints {
      type
      value
    }
  }
  paths {
    screenshot
    preview
    stream
    caption
    vtt
    sprite
  }
  captions {
    language_code
    caption_type
  }
  urls
  studio {
    id
    name
    image_path
  }
  performers {
    id
    name
    image_path
  }
  tags {
    id
    name
  }
}

fragment SceneData on Scene {
  ...SlimSceneData
  details
  urls
  director
  files {
    path
    basename
    format
    width
    height
    video_codec
    audio_codec
    bit_rate
    duration
    frame_rate
    fingerprints {
      type
      value
    }
  }
  tags {
    id
    name
  }
}

query FindScenes($filter: FindFilterType, $scene_filter: SceneFilterType) {
  findScenes(filter: $filter, scene_filter: $scene_filter) {
    count
    scenes {
      ...SlimSceneData
    }
  }
}

query FindScene($id: ID!) {
  findScene(id: $id) {
    ...SceneData
  }
}

query SceneStreams($id: ID!) {
  findScene(id: $id) {
    sceneStreams {
      url
      mime_type
      label
    }
  }
}

mutation UpdateSceneRating($id: ID!, $rating: Int!) {
  sceneUpdate(input: { id: $id, rating100: $rating }) {
    id
    rating100
  }
}

mutation SceneAddO($id: ID!) {
  sceneAddO(id: $id) {
    count
  }
}

mutation SceneAddPlay($id: ID!) {
  sceneAddPlay(id: $id) {
    count
  }
}

mutation SceneIncrementPlayCount($id: ID!) {
  sceneIncrementPlayCount(id: $id)
}

mutation SceneSaveActivity($id: ID!, $resume_time: Float, $play_duration: Float) {
  sceneSaveActivity(id: $id, resume_time: $resume_time, playDuration: $play_duration)
}

query ListScrapers($types: [ScrapeContentType!]!) {
  listScrapers(types: $types) {
    id
    name
    scene {
      urls
      supported_scrapes
    }
    performer {
      urls
      supported_scrapes
    }
    gallery {
      urls
      supported_scrapes
    }
    image {
      urls
      supported_scrapes
    }
  }
}

mutation MetadataGenerate($input: GenerateMetadataInput!) {
  metadataGenerate(input: $input)
}

query ScrapeSingleScene($source: ScraperSourceInput!, $input: ScrapeSingleSceneInput!) {
  scrapeSingleScene(source: $source, input: $input) {
    title
    code
    details
    director
    urls
    date
    image
    remote_site_id
    studio {
      name
      stored_id
    }
    tags {
      name
      stored_id
    }
    performers {
      name
      remote_site_id
      urls
      images
      stored_id
    }
  }
}

query ScrapeSceneURL($url: String!) {
  scrapeSceneURL(url: $url) {
    title
    code
    details
    director
    urls
    date
    image
    remote_site_id
    studio {
      name
      stored_id
    }
    tags {
      name
      stored_id
    }
    performers {
      name
      remote_site_id
      urls
      images
      stored_id
    }
  }
}

mutation SceneMerge($input: SceneMergeInput!) {
  sceneMerge(input: $input) {
    id
  }
}

mutation SceneUpdate($input: SceneUpdateInput!) {
  sceneUpdate(input: $input) {
    id
  }
}

query SceneStreamsForPlayer($id: ID!) {
  sceneStreams(id: $id) {
    url
    mime_type
    label
  }
  findScene(id: $id) {
    sceneStreams {
      url
      mime_type
      label
    }
  }
}
